<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Crear cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <ion-list lines="none">
      <ion-item class="input-item">
        <ion-label position="stacked">Nombre completo</ion-label>
        <ion-input type="text" formControlName="name" placeholder="Tu nombre"></ion-input>
      </ion-item>
      <div class="error-msg" *ngIf="f['name'].invalid && f['name'].touched">
        Mínimo 2 caracteres
      </div>

      <ion-item class="input-item">
        <ion-label position="stacked">Correo electrónico</ion-label>
        <ion-input type="email" formControlName="email" placeholder="tu@email.com" autocomplete="email"></ion-input>
      </ion-item>
      <div class="error-msg" *ngIf="f['email'].invalid && f['email'].touched">
        Ingresa un correo válido
      </div>

      <ion-item class="input-item">
        <ion-label position="stacked">Contraseña</ion-label>
        <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••"></ion-input>
        <ion-button slot="end" fill="clear" (click)="showPassword = !showPassword">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </ion-button>
      </ion-item>
      <div class="error-msg" *ngIf="f['password'].invalid && f['password'].touched">
        Mínimo 6 caracteres
      </div>

      <ion-item class="input-item">
        <ion-label position="stacked">Confirmar contraseña</ion-label>
        <ion-input [type]="showPassword ? 'text' : 'password'" formControlName="confirmPassword" placeholder="••••••"></ion-input>
      </ion-item>
      <div class="error-msg" *ngIf="form.errors?.['mismatch'] && f['confirmPassword'].touched">
        Las contraseñas no coinciden
      </div>
    </ion-list>

    <ion-button expand="block" type="submit" class="ion-margin-top">
      <ion-icon name="person-add-outline" slot="start"></ion-icon>
      Crear Cuenta
    </ion-button>

    <ion-button expand="block" fill="clear" (click)="goLogin()" class="ion-margin-top">
      ¿Ya tienes cuenta? <strong>&nbsp;Inicia sesión</strong>
    </ion-button>
  </form>
</ion-content>
