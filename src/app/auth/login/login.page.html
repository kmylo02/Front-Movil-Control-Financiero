<ion-content class="ion-padding auth-content">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="app-logo-box">
        <svg viewBox="0 0 54 54" width="54" height="54" xmlns="http://www.w3.org/2000/svg">
          <rect x="4"  y="34" width="12" height="16" rx="3" fill="white" opacity="0.92"/>
          <rect x="21" y="22" width="12" height="28" rx="3" fill="white" opacity="0.92"/>
          <rect x="38" y="10" width="12" height="40" rx="3" fill="white" opacity="0.92"/>
          <polyline points="10,34 27,22 44,10" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="44" cy="10" r="4" fill="white" opacity="0.95"/>
        </svg>
      </div>
      <h1>Control Financiero</h1>
      <p>Gestiona tus finanzas personales</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <ion-list lines="none">
        <ion-item class="input-item">
          <ion-label position="stacked">Correo electrónico</ion-label>
          <ion-input
            type="email"
            formControlName="email"
            placeholder="tu@email.com"
            autocomplete="email">
          </ion-input>
        </ion-item>
        <div class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Ingresa un correo válido
        </div>

        <ion-item class="input-item">
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••">
          </ion-input>
          <ion-button slot="end" fill="clear" (click)="showPassword = !showPassword">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>
        <div class="error-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Mínimo 6 caracteres
        </div>
      </ion-list>

      <ion-button expand="block" type="submit" class="ion-margin-top">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Iniciar Sesión
      </ion-button>

      <ion-button expand="block" fill="clear" (click)="goRegister()" class="ion-margin-top">
        ¿No tienes cuenta? <strong>&nbsp;Regístrate</strong>
      </ion-button>
    </form>

    <!-- Botón huella -->
    <div *ngIf="showBiometric" class="biometric-section">
      <div class="biometric-divider">
        <span>o</span>
      </div>
      <ion-button expand="block" fill="outline" color="medium" (click)="loginWithBiometric()">
        <ion-icon name="finger-print-outline" slot="start" color="primary"></ion-icon>
        Ingresar con huella dactilar
      </ion-button>
    </div>

  </div>
</ion-content>
