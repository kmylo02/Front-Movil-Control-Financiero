<ion-content class="ion-padding auth-content">
  <div class="auth-container">
    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" class="app-logo-svg">
        <defs>
          <linearGradient id="cfgrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5"/>
            <stop offset="100%" stop-color="#16a34a"/>
          </linearGradient>
        </defs>
        <rect width="80" height="80" rx="20" fill="url(#cfgrad)"/>
        <rect x="13" y="50" width="13" height="20" rx="3" fill="rgba(255,255,255,0.88)"/>
        <rect x="33" y="36" width="13" height="34" rx="3" fill="rgba(255,255,255,0.88)"/>
        <rect x="53" y="20" width="13" height="50" rx="3" fill="rgba(255,255,255,0.88)"/>
        <polyline points="19,50 39,36 59,20" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="59" cy="20" r="4" fill="white" opacity="0.9"/>
      </svg>
      <h1>Control Financiero</h1>
      <p>Gestiona tus finanzas personales</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <ion-list lines="none">
        <ion-item class="input-item">
          <ion-label position="stacked">Correo electrónico</ion-label>
          <ion-input
            type="email"
            formControlName="email"
            placeholder="tu@email.com"
            autocomplete="email">
          </ion-input>
        </ion-item>
        <div class="error-msg" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Ingresa un correo válido
        </div>

        <ion-item class="input-item">
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••">
          </ion-input>
          <ion-button slot="end" fill="clear" (click)="showPassword = !showPassword">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>
        <div class="error-msg" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Mínimo 6 caracteres
        </div>
      </ion-list>

      <ion-button expand="block" type="submit" class="ion-margin-top">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Iniciar Sesión
      </ion-button>

      <ion-button expand="block" fill="clear" (click)="goRegister()" class="ion-margin-top">
        ¿No tienes cuenta? <strong>&nbsp;Regístrate</strong>
      </ion-button>
    </form>

    <!-- Botón huella -->
    <div *ngIf="showBiometric" class="biometric-section">
      <div class="biometric-divider">
        <span>o</span>
      </div>
      <ion-button expand="block" fill="outline" color="medium" (click)="loginWithBiometric()">
        <ion-icon name="finger-print-outline" slot="start" color="primary"></ion-icon>
        Ingresar con huella dactilar
      </ion-button>
    </div>

  </div>
</ion-content>
